appId: com.netsentinel.app
productName: NetSentinel
copyright: Copyright (c) 2026 NetSentinel

directories:
  output: release
  buildResources: build

files:
  - dist/electron/**/*
  - dist/renderer/**/*

extraResources:
  - from: resources/
    to: engine
    filter:
      - "netsentinel-engine*"
  - from: resources/nmap
    to: nmap

win:
  target:
    - target: nsis
      arch:
        - x64
  sign: null
  certificatePassword: null
  certificateFile: null

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.utilities

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Network

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  license: LICENSE.txt
